name: DockerHub Push and HF Sync

on:
  push:
    branches: [ main ] # Triggers every time you push from iSH

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for Git to HF sync
          lfs: true

      # Step 1: Login and Push to DockerHub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This creates hoopstreet/tiktok-prompt-generator:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:latest

      # Step 2: Push Source Code to Hugging Face
      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use your HF Space URL from your prompt
          git remote add hf https://hoopstreet:$HF_TOKEN@huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
          git push --force hf main
