name: Build and Push Moondream UI
on:
  push:
    branches: [ main ]
    paths: [ 'moondream-ui/**' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: ./moondream-ui
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/moondream-frontend:latest
