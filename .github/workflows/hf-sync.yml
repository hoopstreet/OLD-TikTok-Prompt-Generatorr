name: Sync to Hugging Face
on:
  push:
    paths: [ 'Dockerfile', 'README.md' ]
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "hoopstreet143@gmail.com"
          git config --global user.name "hoopstreet"
          mkdir hf_sync_dir
          cp Dockerfile README.md hf_sync_dir/
          cd hf_sync_dir
          git init
          git add .
          git commit -m "Sync: Stable v1.3.0 Architecture"
          git remote add hf https://hoopstreet:$HF_TOKEN@huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
          git push --force hf master:main
