name: Build and Sync Tagged Version
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Tag Name
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Tagged Image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: hoopstreet/tiktok-prompt-generator:${{ steps.vars.outputs.tag }}

      - name: Update HF Dockerfile and Push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "hoopstreet143@gmail.com"
          git config --global user.name "hoopstreet"
          
          # Use sed to update the FROM line to the current tag automatically
          sed -i "s|FROM hoopstreet/tiktok-prompt-generator:.*|FROM hoopstreet/tiktok-prompt-generator:${{ steps.vars.outputs.tag }}|" Dockerfile
          
          # Create temporary sync repo
          mkdir hf_sync
          cp Dockerfile README.md hf_sync/
          cd hf_sync
          
          git init
          git checkout -b main
          git add .
          git commit -m "Deploy: ${{ steps.vars.outputs.tag }} (Auto-Synced)"
          git remote add hf https://hoopstreet:$HF_TOKEN@huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
          git push --force hf main
