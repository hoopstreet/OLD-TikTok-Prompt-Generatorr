name: Build Code to Docker & Sync Tags
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract Version
        id: vars
        run: |
          if [[ ${GITHUB_REF} == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:${{ steps.vars.outputs.tag }}
            ${{ vars.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:latest

      - name: Auto-Update GitHub Dockerfile Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config --global user.email "hoopstreet143@gmail.com"
          git config --global user.name "hoopstreet"
          git checkout main
          git pull origin main --rebase
          
          # Update FROM line and Build Version comments
          sed -i "s|FROM .*/tiktok-prompt-generator:.*|FROM ${{ vars.DOCKERHUB_USERNAME }}/tiktok-prompt-generator:${{ steps.vars.outputs.tag }}|" Dockerfile
          CLEAN_TAG=$(echo "${{ steps.vars.outputs.tag }}" | sed 's/^v//')
          sed -i "s/# Build Version: .*/# Build Version: $CLEAN_TAG/" Dockerfile
          sed -i "s/# Forced Refresh: .*/# Forced Refresh: $(date)/" Dockerfile
          
          git add Dockerfile
          git commit -m "Infra: Synced Dockerfile to Tag ${{ steps.vars.outputs.tag }}"
          git push origin main
