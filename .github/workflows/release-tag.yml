name: Release Tagged Version
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract Tag Name
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Tagged Image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: hoopstreet/tiktok-prompt-generator:${{ steps.vars.outputs.tag }}

      - name: Update Main Repo Dockerfile
        run: |
          git config --global user.email "hoopstreet143@gmail.com"
          git config --global user.name "hoopstreet"
          git checkout main
          git pull origin main --rebase
          
          # 1. Update the FROM line
          sed -i "s|FROM hoopstreet/tiktok-prompt-generator:.*|FROM hoopstreet/tiktok-prompt-generator:${{ steps.vars.outputs.tag }}|" Dockerfile
          
          # 2. Update all "Build Version" comments to match the tag
          # This removes the 'v' (if present) for the comment to look clean
          CLEAN_TAG=$(echo "${{ steps.vars.outputs.tag }}" | sed 's/^v//')
          sed -i "s/# Build Version: .*/# Build Version: $CLEAN_TAG/" Dockerfile
          
          # 3. Update the Forced Refresh timestamp
          sed -i "s/# Forced Refresh: .*/# Forced Refresh: $(date)/" Dockerfile
          
          git add Dockerfile
          git commit -m "Infra: Auto-update Dockerfile to ${{ steps.vars.outputs.tag }} and version comments"
          git push origin main

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          sleep 10
          mkdir hf_sync
          cp Dockerfile README.md hf_sync/
          cd hf_sync
          git init
          git config user.name "hoopstreet"
          git config user.email "hoopstreet143@gmail.com"
          git checkout -b main
          git add .
          git commit -m "Deploy: ${{ steps.vars.outputs.tag }} (Synced Versioning)"
          git remote add hf https://hoopstreet:$HF_TOKEN@huggingface.co/spaces/hoopstreet/TikTok-Prompt-Generator
          git push --force hf main
